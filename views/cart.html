<div id="view-cart" class="cart-container">
                <div class="lc-title">Корзина</div>
                
                <div class="scroll-area">
                    <div id="cart-items-list" class="cart-items-wrapper"></div>
                    
                    <div class="cart-summary" id="cart-summary-block">
                        <div class="section-header" style="margin-top:0;">Оформление заказа</div>
                        <input type="text" id="order-name" class="lc-input" placeholder="Ваши ФИО">
                        <input type="tel" id="order-phone" class="lc-input" placeholder="Телефон">
                        <input type="email" id="order-email" class="lc-input" placeholder="Ваш e-mail">
                        
                        <div class="section-header" id="cart-delivery-title" style="margin-top:15px;">Доставка (СДЭК)</div>
                        
                        <div id="cdek-status" style="font-size:12px; margin-bottom:15px; color:var(--locus-dark); line-height: 1.4;">
                            <span style="opacity:0.6">Стоимость доставки рассчитается после выбора ПВЗ</span>
                        </div>

                        <div id="custom-cdek-widget" style="background: rgba(255,255,255,0.6); padding: 15px; border: 1px solid var(--locus-border); border-radius: 8px; margin-bottom: 15px;">
                            <label class="lc-label">1. Город доставки</label>
                            <div style="position: relative; margin-bottom: 15px;">
                                <input type="text" id="cdek-city-input" class="lc-input" placeholder="Начните вводить город..." autocomplete="off" style="margin-bottom: 0;">
                                <div id="cdek-city-results" style="position: absolute; top: 100%; left: 0; right: 0; background: #fff; border: 1px solid var(--locus-border); border-top: none; z-index: 100; max-height: 200px; overflow-y: auto; display: none; box-shadow: 0 10px 20px rgba(0,0,0,0.1); border-radius: 0 0 8px 8px;"></div>
                            </div>

                            <div id="cdek-pvz-wrapper" style="display: none;">
                                <label class="lc-label">2. Пункт выдачи</label>
                                <select id="cdek-pvz-select" class="lc-input" style="padding: 10px 0; margin-bottom: 0; background: transparent;">
                                    <option value="">Выберите пункт выдачи...</option>
                                </select>
                            </div>
                        </div>

                        <div id="self-pickup-block" style="margin-bottom: 15px; padding: 15px; background: rgba(255,255,255,0.6); border: 1px solid var(--locus-border); border-radius: 8px;">
                            <div class="checkbox-row" style="margin: 0; font-size: 13px; line-height: 1.45; opacity: 1;">
                                <input type="checkbox" id="self-pickup-checkbox" onchange="UserSystem.toggleSelfPickup()">
                                <label for="self-pickup-checkbox" style="font-weight: 600; color: var(--locus-dark);">Заберу заказ из пункта выдачи<br>(ТЦ "Атолл", Октябрьская 27)</label>
                            </div>
                            
                            <div id="self-pickup-code-block" style="display: none; margin-top: 12px; padding-top: 12px; border-top: 1px dashed var(--locus-border);">
                                <span style="font-size: 12px; color: gray;">Ваш код для открытия ячейки с заказом:</span>
                                <div id="self-pickup-code" style="font-size: 24px; font-weight: bold; letter-spacing: 4px; color: #187a30; margin-top: 5px;"></div>
                            </div>
                        </div>

                        <div class="promo-block">
                            <input type="text" id="cart-promo-input" class="promo-input" placeholder="Введите промокод">
                            <button class="btn-apply-promo" id="btn-apply-promo">Применить</button>
                        </div>

                        <div class="summary-row"><span>Товары</span><span id="cart-subtotal">0 ₽</span></div>
                        <div class="summary-row"><span>Доставка</span><span id="cart-shipping-val">0 ₽</span></div>
                        <div class="summary-row"><span>Скидка лояльности (<span id="cart-discount-percent">0</span>%)</span><span id="cart-discount-val">0 ₽</span></div>
                        <div class="summary-row" id="row-promo-discount" style="display:none; color:#187a30;"><span>Промокод</span><span id="cart-promo-val">-0 ₽</span></div>
                        
                        <div class="summary-row total"><span>Итого</span><span id="cart-total">0 ₽</span></div>
                        
                        <div class="checkbox-row" style="margin-top: 20px; margin-bottom: 20px;">
                            <input type="checkbox" id="policy-check">
                            <label for="policy-check">Я согласен с обработкой персональных данных согласно <br><a href="https://locus.coffee/mag?lot=%D0%9F%D0%BE%D0%BB%D0%B8%D1%82%D0%B8%D0%BA%D0%B0+++%D0%BA%D0%BE%D0%BD%D1%84%D0%B8%D0%B4%D0%B5%D0%BD%D1%86%D0%B8%D0%B0%D0%BB%D1%8C%D0%BD%D0%BE%D1%81%D1%82%D0%B8#" style="text-decoration:underline;">Политики конфиденциальности</a></label>
                        </div>

                        <button class="lc-btn" id="btn-checkout" style="margin-top: 0;">Оформить и оплатить</button>
                    </div>
                </div>
            </div>
