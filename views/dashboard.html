<div id="view-dashboard" class="dashboard-container">
                <div class="lc-title">Личный кабинет</div>
                <div class="scroll-area">
                    <div class="loyalty-section">
                        <div class="loyalty-header"><span class="loyalty-label">Ваша скидка</span><span class="loyalty-value" id="user-discount-val">0%</span></div>
                        <div class="progress-track"><div class="progress-fill" id="user-progress-fill"></div></div>
                        <div class="loyalty-info" id="user-next-level">Потрачено: <span id="user-spent-val">0</span> ₽.</div>
                    </div>

                    <div class="checkbox-row" style="margin-bottom: 20px; font-size: 13px; line-height: 1.4;">
                        <input type="checkbox" id="notify-new-lots-check" onchange="UserSystem.toggleNewLotsNotification()">
                        <label for="notify-new-lots-check" style="font-weight: 600; color: var(--locus-dark);">Сообщать о новинках каталога кофе</label>
                    </div>

                    <!-- USER MESSAGES SECTION -->
                    <div id="user-messages-section">
                        <div class="collapsible-header" onclick="UserSystem.toggleSection('user-messages')" style="border-bottom: none;">
                            <div style="display:flex; align-items:center; gap:10px;">
                                <div class="section-header" style="margin:0;">Сообщения</div>
                                <button id="btn-refresh-msgs" style="border:none; background:none; cursor:pointer;" onclick="event.stopPropagation(); MessageSystem.loadMessagesForUser();">
                                    <svg width="14" height="14" viewBox="0 0 24 24" fill="var(--locus-dark)">
                                        <path d="M17.65 6.35C16.2 4.9 14.21 4 12 4c-4.42 0-7.99 3.58-7.99 8s3.57 8 7.99 8c3.73 0 6.84-2.55 7.73-6h-2.08c-.82 2.33-3.04 4-5.65 4-3.31 0-6-2.69-6-6s2.69-6 6-6c1.66 0 3.14.69 4.22 1.78L13 11h7V4l-2.35 2.35z"/>
                                    </svg>
                                </button>
                            </div>
                            <span class="arrow-indicator" id="arrow-user-messages">▼</span>
                        </div>
                        <div id="cont-user-messages" class="collapsible-content">
                             <div id="user-messages-list" style="margin-bottom:20px;"></div>
                        </div>
                    </div>

                    <!-- СЕРВИС ПОДПИСОК ВРЕМЕННО ОТКЛЮЧЕН 
<div class="collapsible-header" onclick="UserSystem.toggleSection('sub')">
    <div class="section-header" style="margin:0;">Ваша подписка</div>
    <span class="arrow-indicator" id="arrow-sub">▼</span>
</div>
<div id="cont-sub" class="collapsible-content">
    <div id="user-subscription-list" style="margin-bottom: 20px;"></div>
</div>
-->

                    <div class="collapsible-header" onclick="UserSystem.toggleSection('hist')">
                        <div class="section-header" style="margin:0;">История покупок</div>
                        <span class="arrow-indicator" id="arrow-hist">▼</span>
                    </div>
                    <div id="cont-hist" class="collapsible-content">
                        <div id="user-history-list" style="margin-bottom: 20px;"></div>
                    </div>
                    <div class="collapsible-header" onclick="UserSystem.toggleSection('ws-hist')">
                        <div class="section-header" style="margin:0;">Оптовые заказы</div>
                        <span class="arrow-indicator" id="arrow-ws-hist">▼</span>
                    </div>
                    <div id="cont-ws-hist" class="collapsible-content hidden">
                        <div id="user-ws-history-list" style="margin-bottom: 20px;"></div>
                    </div>
                    <div class="section-header" style="margin-top:20px;">Рекомендуем вам</div>
                    <div id="user-recommendations-list"></div>
                    <div class="feedback-area">
                        <div class="section-header">Связь с владельцем</div>
                        <textarea id="feedback-text" placeholder="Ваше сообщение..."></textarea>
                        <button class="lc-btn" id="btn-send-feedback">Отправить</button>
                    </div>
                    <div class="lc-link" id="btn-logout" style="margin-top:20px; color:#B66A58;">Выйти</div>
                </div>
            </div>
